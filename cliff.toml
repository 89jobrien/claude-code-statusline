[changelog]
header = "# Changelog\n\n"
body = """
## {{ version }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}

{% for commit in commits %}\
- {{ commit.message | split(pat=" (") | first }}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/glauberlima/claude-code-statusline/pull/{{ commit.remote.pr_number }})){% endif %} \
— [@{{ commit.remote.username | default(value=commit.author.name) }}](https://github.com/{{ commit.remote.username | default(value=commit.author.name) }})
{% endfor %}
{% endfor %}
"""
trim = true

[remote.github]
owner = "glauberlima"
repo  = "claude-code-statusline"

[git]
conventional_commits = true
commit_parsers = [
  { message = "^(feat|fix|refactor)(\\([^)]*\\))?!",  group = "Breaking Changes" },
  { message = "^feat",                            group = "Features" },
  { message = "^fix",                             group = "Bug Fixes" },
  { message = "^perf",                            group = "Performance" },
  { message = "^refactor",                        group = "Refactoring" },
  { message = "^docs",                            group = "Documentation" },
  { message = "^ci|^test|^build|^chore",         skip = true },
  { message = ".*",                               skip = true },
]
