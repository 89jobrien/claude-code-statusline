name: Publish Unstable Release

on:
  push:
    tags:
      - 'v*-dev.*'

jobs:
  build-macos:
    name: Build macOS universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/statusline \
            target/aarch64-apple-darwin/release/statusline \
            -output statusline-macos
      - uses: actions/upload-artifact@v7
        with:
          name: statusline-macos
          path: statusline-macos

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
      - name: Build
        run: cargo build --release
      - name: Copy artifact
        run: cp target/release/statusline statusline-linux-x64
      - uses: actions/upload-artifact@v7
        with:
          name: statusline-linux-x64
          path: statusline-linux-x64

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
      - name: Build
        run: cargo build --release
      - name: Copy artifact
        run: copy target\release\statusline.exe statusline-windows-x64.exe
        shell: cmd
      - uses: actions/upload-artifact@v7
        with:
          name: statusline-windows-x64
          path: statusline-windows-x64.exe

  release:
    name: Create GitHub Prerelease
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/cache@v5
        id: cliff-cache
        with:
          path: ~/.cargo/bin/git-cliff
          key: git-cliff-2.13.1-${{ runner.os }}

      - name: Install git-cliff
        if: steps.cliff-cache.outputs.cache-hit != 'true'
        run: cargo install git-cliff --version 2.13.1 --locked

      - name: Generate changelog
        id: changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_STABLE=$(git describe --tags --abbrev=0 --exclude "*-dev.*" 2>/dev/null || echo "")
          RANGE="${LAST_STABLE:+${LAST_STABLE}..}HEAD"
          BODY=$(git cliff --tag "$GITHUB_REF_NAME" "$RANGE" --ignore-tags ".*-dev\..*" --strip all 2>&1 || true)
          echo "body<<CLIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CLIFF_EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8

      - name: Create prerelease
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          body: |
            > ⚠️ **Unstable release** — for testing only. Do not use in production.

            ${{ steps.changelog.outputs.body }}
          files: |
            statusline-macos/statusline-macos
            statusline-linux-x64/statusline-linux-x64
            statusline-windows-x64/statusline-windows-x64.exe
