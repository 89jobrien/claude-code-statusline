name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        type: choice
        options: [stable, unstable]

jobs:
  cut:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      skipped: ${{ steps.version.outputs.skipped }}

    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/cache@v5
        if: inputs.type == 'stable'
        id: cliff-cache
        with:
          path: ~/.cargo/bin/git-cliff
          key: git-cliff-2.13.1-${{ runner.os }}

      - name: Install git-cliff
        if: inputs.type == 'stable' && steps.cliff-cache.outputs.cache-hit != 'true'
        run: cargo install git-cliff --version 2.13.1 --locked

      - name: Compute version
        id: version
        env:
          SHA7: ${{ github.sha }}
        run: |
          if [ "${{ inputs.type }}" = "stable" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" --exclude "*-dev*" 2>/dev/null || echo "")
          else
            LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*" --exclude "*-dev*" 2>/dev/null || echo "")
          fi

          LOG_RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"

          BUMP=$(git log "$LOG_RANGE" --pretty=format:"%s%n%b" | awk '
            BEGIN { bump = 0 }
            /^(feat|fix|refactor)(\([^)]*\))?!:/ { if (bump < 3) bump = 3 }
            /^BREAKING CHANGE:/                   { if (bump < 3) bump = 3 }
            /^feat(\([^)]*\))?:/                  { if (bump < 2) bump = 2 }
            /^(fix|perf|refactor|docs|chore|style)(\([^)]*\))?:/ { if (bump < 1) bump = 1 }
            END {
              if (bump == 0) print "skip"
              else if (bump == 1) print "patch"
              else if (bump == 2) print "minor"
              else print "major"
            }
          ')

          echo "Detected bump: $BUMP"

          if [ "${{ inputs.type }}" = "stable" ] && [ "$BUMP" = "skip" ]; then
            echo "tag=skip" >> "$GITHUB_OUTPUT"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Unstable: treat "skip" as "patch"
          [ "$BUMP" = "skip" ] && BUMP="patch"

          BASE="${LAST_TAG:-v0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE#v}"
          # Strip any -dev.* suffix from PATCH before arithmetic
          PATCH="${PATCH%%-*}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          if [ "${{ inputs.type }}" = "stable" ]; then
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v${VERSION}"
          else
            SHA="${SHA7::7}"
            VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${SHA}"
            TAG="v${VERSION}"
          fi

          echo "Version: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: No release needed
        if: steps.version.outputs.skipped == 'true'
        run: echo "No releasable commits since last tag. Skipping."

      - name: Update CHANGELOG.md
        if: inputs.type == 'stable' && steps.version.outputs.skipped != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch CHANGELOG.md
          git cliff --tag "$TAG" --unreleased --prepend CHANGELOG.md

      - name: Bump Cargo.toml version
        if: inputs.type == 'stable' && steps.version.outputs.skipped != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Commit, tag, and push (stable)
        if: inputs.type == 'stable' && steps.version.outputs.skipped != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md Cargo.toml Cargo.lock
          git commit -m "chore(release): $TAG"
          git tag -a "$TAG" -m "$TAG"
          git push origin main --follow-tags

      - name: Tag and push (unstable)
        if: inputs.type == 'unstable'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "unstable $TAG"
          git push origin "$TAG"

  build-macos:
    name: Build macOS universal
    needs: [cut]
    if: needs.cut.outputs.skipped != 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96.0'
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin
      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin
      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/statusline \
            target/aarch64-apple-darwin/release/statusline \
            -output statusline-macos
      - name: Smoke test
        run: ./statusline-macos --version
      - uses: actions/upload-artifact@v7
        with:
          name: statusline-macos
          path: statusline-macos

  build-linux:
    name: Build Linux x64
    needs: [cut]
    if: needs.cut.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96.0'
      - name: Build
        run: cargo build --release
      - name: Copy artifact
        run: cp target/release/statusline statusline-linux-x64
      - name: Smoke test
        run: ./statusline-linux-x64 --version
      - uses: actions/upload-artifact@v7
        with:
          name: statusline-linux-x64
          path: statusline-linux-x64

  build-windows:
    name: Build Windows x64
    needs: [cut]
    if: needs.cut.outputs.skipped != 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96.0'
      - name: Build
        run: cargo build --release
      - name: Copy artifact
        run: copy target\release\statusline.exe statusline-windows-x64.exe
        shell: cmd
      - name: Smoke test
        run: .\statusline-windows-x64.exe --version
      - uses: actions/upload-artifact@v7
        with:
          name: statusline-windows-x64
          path: statusline-windows-x64.exe

  publish:
    name: ${{ inputs.type == 'stable' && 'Create GitHub Release' || 'Create GitHub Prerelease' }}
    needs: [cut, build-macos, build-linux, build-windows]
    if: needs.cut.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8

      - name: Generate checksums
        run: |
          (cd statusline-macos   && sha256sum statusline-macos)           > checksums.txt
          (cd statusline-linux-x64 && sha256sum statusline-linux-x64)    >> checksums.txt
          (cd statusline-windows-x64 && sha256sum statusline-windows-x64.exe) >> checksums.txt
          cat checksums.txt

      - name: Extract release notes from CHANGELOG (stable)
        if: inputs.type == 'stable'
        id: notes-stable
        env:
          TAG: ${{ needs.cut.outputs.tag }}
        run: |
          CHANGELOG_BODY=$(awk '/^## /{if(found)exit; found=1; next} found{print}' CHANGELOG.md)
          CURL_CMD="curl -fsSL https://raw.githubusercontent.com/glauberlima/claude-code-statusline/main/install.sh | bash -s ${TAG}"
          PS_CMD="& ([scriptblock]::Create((irm 'https://raw.githubusercontent.com/glauberlima/claude-code-statusline/main/install.ps1'))) -Version ${TAG}"
          INSTALL_BLOCK=$(printf '## Install this version\n\n**macOS / Linux / WSL**\n```bash\n%s\n```\n\n**Windows (PowerShell 5.1+)**\n```powershell\n%s\n```\n\n---' "$CURL_CMD" "$PS_CMD")
          BODY="${INSTALL_BLOCK}"$'\n\n'"${CHANGELOG_BODY}"
          echo "body<<CLIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CLIFF_EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        if: inputs.type == 'unstable'
        id: cliff-cache
        with:
          path: ~/.cargo/bin/git-cliff
          key: git-cliff-2.13.1-${{ runner.os }}

      - name: Install git-cliff (unstable)
        if: inputs.type == 'unstable' && steps.cliff-cache.outputs.cache-hit != 'true'
        run: cargo install git-cliff --version 2.13.1 --locked

      - name: Generate changelog (unstable)
        if: inputs.type == 'unstable'
        id: notes-unstable
        env:
          TAG: ${{ needs.cut.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_STABLE=$(git describe --tags --abbrev=0 --exclude "*-dev.*" 2>/dev/null || echo "")
          RANGE="${LAST_STABLE:+${LAST_STABLE}..}HEAD"
          CLIFF_BODY=$(NO_COLOR=1 git cliff --tag "$TAG" "$RANGE" --ignore-tags ".*-dev\..*" --strip all 2>/dev/null || true)
          CURL_CMD="curl -fsSL https://raw.githubusercontent.com/glauberlima/claude-code-statusline/main/install.sh | bash -s ${TAG}"
          PS_CMD="& ([scriptblock]::Create((irm 'https://raw.githubusercontent.com/glauberlima/claude-code-statusline/main/install.ps1'))) -Version ${TAG}"
          INSTALL_BLOCK=$(printf '## Install this version\n\n**macOS / Linux / WSL**\n```bash\n%s\n```\n\n**Windows (PowerShell 5.1+)**\n```powershell\n%s\n```\n\n---' "$CURL_CMD" "$PS_CMD")
          BODY="${INSTALL_BLOCK}"$'\n\n'"${CLIFF_BODY}"
          echo "body<<CLIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CLIFF_EOF" >> "$GITHUB_OUTPUT"

      - name: Create release (stable)
        if: inputs.type == 'stable'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.cut.outputs.tag }}
          body: ${{ steps.notes-stable.outputs.body }}
          files: |
            statusline-macos/statusline-macos
            statusline-linux-x64/statusline-linux-x64
            statusline-windows-x64/statusline-windows-x64.exe
            checksums.txt

      - name: Create prerelease (unstable)
        if: inputs.type == 'unstable'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.cut.outputs.tag }}
          prerelease: true
          body: |
            > ⚠️ **Unstable release** — pre-release build for testing only.

            ${{ steps.notes-unstable.outputs.body }}
          files: |
            statusline-macos/statusline-macos
            statusline-linux-x64/statusline-linux-x64
            statusline-windows-x64/statusline-windows-x64.exe
            checksums.txt
